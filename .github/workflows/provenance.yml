name: Provenance
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    name: Warden provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: warden verify (provenance-skip)
        run: |
          git fetch origin 'refs/notes/warden:refs/notes/warden' 2>/dev/null || true
          npx -y @klarlabs-studio/warden verify --commit "${{ github.event.pull_request.head.sha }}" || echo "unverified — CI runs checks"
