name: Deploy site image

on:
  push:
    branches: [main]
    paths:
      - 'apps/klarlabs.de/**'
      - 'packages/ui/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-site.yml'
    tags: ['site-v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # main pushes keep latest + commit SHA (continuous); a `site-vX.Y.Z` tag
      # publishes the semver image (X.Y.Z and X.Y) for Rollops to track.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/klarlabs-studio/klarlabs-site
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,enable={{is_default_branch}}
            type=match,pattern=site-v(\d+\.\d+\.\d+),group=1
            type=match,pattern=site-v(\d+\.\d+),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/site-v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/klarlabs.de/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
