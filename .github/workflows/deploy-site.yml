name: Deploy site image

on:
  push:
    branches: [main]
    paths:
      - 'apps/klarlabs.de/**'
      - 'packages/ui/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/klarlabs.de/Dockerfile
          push: true
          tags: |
            ghcr.io/klarlabs-studio/klarlabs-site:latest
            ghcr.io/klarlabs-studio/klarlabs-site:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
