name: Publish @klarlabs-studio/ui

on:
  push:
    tags:
      - 'ui-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@klarlabs-studio'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        working-directory: packages/ui
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#ui-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION != package.json $PKG_VERSION"
            exit 1
          fi

      - name: Test with coverage gate
        run: pnpm --filter @klarlabs-studio/ui test:coverage

      - name: Build
        run: pnpm --filter @klarlabs-studio/ui build

      - name: Publish to GitHub Packages
        working-directory: packages/ui
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
