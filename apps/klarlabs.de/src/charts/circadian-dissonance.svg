<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" role="img" aria-label="Dissonance over a work week. Without a sleep cycle it ratchets upward and stays above the healthy line. With nightly consolidation it rises through each day and falls each night, oscillating below the line — a circadian rhythm." font-family="system-ui, -apple-system, Segoe UI, sans-serif">
<title>A circadian rhythm, not a ratchet</title>
<text x="24" y="32" fill="currentColor" font-size="17" font-weight="600">A circadian rhythm, not a ratchet</text>
<text x="24" y="52" fill="currentColor" opacity="0.62" font-size="12.5">Dissonance over a work week — the brain that sleeps recovers every night.</text>
<line x1="80" y1="300" x2="684" y2="300" stroke="currentColor" stroke-opacity="0.35"/>
<line x1="80" y1="86" x2="80" y2="300" stroke="currentColor" stroke-opacity="0.35"/>
<text x="70" y="304" fill="currentColor" opacity="0.55" font-size="11" text-anchor="end">0</text>
<text x="70" y="96" fill="currentColor" opacity="0.55" font-size="11" text-anchor="end">high</text>
<text x="30" y="196" fill="currentColor" opacity="0.55" font-size="11" transform="rotate(-90 30 196)" text-anchor="middle">dissonance</text>
<text x="140" y="318" fill="currentColor" opacity="0.5" font-size="11" text-anchor="middle">day 1</text>
<text x="261" y="318" fill="currentColor" opacity="0.5" font-size="11" text-anchor="middle">day 2</text>
<line x1="201" y1="86" x2="201" y2="300" stroke="currentColor" stroke-opacity="0.08"/>
<text x="382" y="318" fill="currentColor" opacity="0.5" font-size="11" text-anchor="middle">day 3</text>
<line x1="322" y1="86" x2="322" y2="300" stroke="currentColor" stroke-opacity="0.08"/>
<text x="503" y="318" fill="currentColor" opacity="0.5" font-size="11" text-anchor="middle">day 4</text>
<line x1="442" y1="86" x2="442" y2="300" stroke="currentColor" stroke-opacity="0.08"/>
<text x="624" y="318" fill="currentColor" opacity="0.5" font-size="11" text-anchor="middle">day 5</text>
<line x1="563" y1="86" x2="563" y2="300" stroke="currentColor" stroke-opacity="0.08"/>
<line x1="80" y1="265.3" x2="684" y2="265.3" stroke="currentColor" stroke-opacity="0.4" stroke-dasharray="4 4"/>
<text x="684" y="259.3" fill="currentColor" opacity="0.6" font-size="11" text-anchor="end">healthy line</text>
<path d="M 80.0 272.3 L 200.8 241.1 L 200.8 241.1 L 321.6 209.9 L 321.6 209.9 L 442.4 178.7 L 442.4 178.7 L 563.2 147.5 L 563.2 147.5 L 684.0 116.3" fill="none" stroke="currentColor" stroke-opacity="0.5" stroke-width="2" stroke-linejoin="round"/>
<text x="678" y="108" fill="currentColor" opacity="0.6" font-size="11.5" text-anchor="end">without sleep — a ratchet</text>
<path d="M 82.4 275.7 L 176.6 241.1 L 200.8 279.2 L 203.2 279.2 L 297.4 244.5 L 321.6 276.4 L 324.0 276.4 L 418.2 241.8 L 442.4 273.7 L 444.8 273.7 L 539.0 239.0 L 563.2 270.9 L 565.6 270.9 L 659.8 236.2 L 684.0 268.1" fill="none" stroke="#E11D48" stroke-width="2.4" stroke-linejoin="round"/>
<circle cx="200.8" cy="279.2" r="3" fill="#E11D48"/>
<text x="200.8" y="295" fill="#E11D48" font-size="9" text-anchor="middle" opacity="0.85">sleep</text>
<circle cx="321.6" cy="276.4" r="3" fill="#E11D48"/>
<text x="321.6" y="292" fill="#E11D48" font-size="9" text-anchor="middle" opacity="0.85">sleep</text>
<circle cx="442.4" cy="273.7" r="3" fill="#E11D48"/>
<text x="442.4" y="290" fill="#E11D48" font-size="9" text-anchor="middle" opacity="0.85">sleep</text>
<circle cx="563.2" cy="270.9" r="3" fill="#E11D48"/>
<text x="563.2" y="287" fill="#E11D48" font-size="9" text-anchor="middle" opacity="0.85">sleep</text>
<circle cx="684.0" cy="268.1" r="3" fill="#E11D48"/>
<text x="684.0" y="284" fill="#E11D48" font-size="9" text-anchor="middle" opacity="0.85">sleep</text>
<text x="177" y="206" fill="#E11D48" font-size="11.5" font-weight="600" text-anchor="middle">with nightly consolidation</text>
