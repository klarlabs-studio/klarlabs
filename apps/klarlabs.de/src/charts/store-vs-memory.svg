<svg xmlns="http://www.w3.org/2000/svg" width="720" height="292" viewBox="0 0 720 292" role="img" aria-label="A store holds bytes between a write and a read. A memory runs continuous background processes — encode, consolidate, forget, retrieve, reflect — in between, and what it recalls depends on that work." font-family="system-ui, -apple-system, Segoe UI, sans-serif">
<title>A store holds. A memory works.</title>
<defs>
<marker id="svm-ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="currentColor" opacity="0.5"/></marker>
<marker id="svm-aha" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0891B2"/></marker>
</defs>
<text x="24" y="30" fill="currentColor" font-size="17" font-weight="600">A store holds. A memory works.</text>
<text x="24" y="50" fill="currentColor" opacity="0.6" font-size="12.5">The same write and read — the difference is everything in between.</text>

<g opacity="0.55">
<text x="24" y="101" fill="currentColor" font-size="11" font-weight="700" letter-spacing="0.08em">STORE</text>
<rect x="96" y="83" width="72" height="30" rx="6" fill="none" stroke="currentColor"/>
<text x="132" y="102" fill="currentColor" font-size="12" text-anchor="middle">write</text>
<line x1="170" y1="98" x2="250" y2="98" stroke="currentColor" marker-end="url(#svm-ah)"/>
<rect x="252" y="83" width="150" height="30" rx="6" fill="currentColor" fill-opacity="0.06" stroke="currentColor"/>
<text x="327" y="102" fill="currentColor" font-size="12" text-anchor="middle">bytes on disk</text>
<line x1="404" y1="98" x2="484" y2="98" stroke="currentColor" marker-end="url(#svm-ah)"/>
<rect x="486" y="83" width="72" height="30" rx="6" fill="none" stroke="currentColor"/>
<text x="522" y="102" fill="currentColor" font-size="12" text-anchor="middle">read</text>
</g>

<text x="24" y="186" fill="#0891B2" font-size="11" font-weight="700" letter-spacing="0.08em">MEMORY</text>
<rect x="96" y="168" width="72" height="30" rx="6" fill="none" stroke="#0891B2"/>
<text x="132" y="187" fill="#0891B2" font-size="12" text-anchor="middle">write</text>
<line x1="170" y1="183" x2="212" y2="183" stroke="#0891B2" marker-end="url(#svm-aha)"/>
<rect x="214" y="159" width="356" height="48" rx="9" fill="#0891B2" fill-opacity="0.07" stroke="#0891B2"/>
<text x="392" y="181" fill="#0891B2" font-size="12.5" font-weight="600" text-anchor="middle">encode · consolidate · forget · retrieve · reflect</text>
<text x="392" y="198" fill="currentColor" opacity="0.65" font-size="11" text-anchor="middle">continuous background processes — deterministic, no LLM</text>
<line x1="572" y1="183" x2="614" y2="183" stroke="#0891B2" marker-end="url(#svm-aha)"/>
<rect x="616" y="168" width="72" height="30" rx="6" fill="none" stroke="#0891B2"/>
<text x="652" y="187" fill="#0891B2" font-size="12" text-anchor="middle">read</text>

<path d="M 652 198 C 652 250, 392 252, 392 211" fill="none" stroke="#0891B2" opacity="0.55" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#svm-aha)"/>
<text x="392" y="278" fill="currentColor" opacity="0.6" font-size="11" text-anchor="middle">what it recalls tomorrow depends on the work it did overnight</text>
</svg>
