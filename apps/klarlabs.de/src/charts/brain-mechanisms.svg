<text x="482" y="288" fill="currentColor" opacity="0.72" font-size="11.5">hybrid recall · bounded self-correction</text>
<line x1="360" y1="384" x2="360" y2="400" stroke="#E11D48" stroke-opacity="0.45" stroke-width="1.5"/>
