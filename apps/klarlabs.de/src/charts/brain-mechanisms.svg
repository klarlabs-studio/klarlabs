<svg xmlns="http://www.w3.org/2000/svg" width="720" height="468" viewBox="0 0 720 468" role="img" aria-label="A stylized brain surrounded by the five cognitive processes Mnemos runs: encode, consolidate, forget, retrieve, and reflect — the last being the brain-health vitals." font-family="system-ui, -apple-system, Segoe UI, sans-serif">
<title>One brain, many organs</title>
<text x="24" y="32" fill="currentColor" font-size="17" font-weight="600">One brain, many organs</text>
<text x="24" y="52" fill="currentColor" opacity="0.62" font-size="12.5">Mnemos runs the processes a memory needs — continuously, deterministically, and now on a sleep cycle.</text>
